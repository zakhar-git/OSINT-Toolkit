name: Feature request
description: Propose a documentation, workflow, automation, or navigation improvement.
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What investigator or maintainer problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful change and where it belongs.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include existing pages or tools that partly address the need.
  - type: textarea
    id: risk
    attributes:
      label: Safety and maintenance impact
      description: Explain new data collection, legal, privacy, dependency, or upkeep costs.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This request does not require publishing personal data or unauthorized-access guidance.
          required: true

