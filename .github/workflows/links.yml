name: Broken link check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "lychee.toml"
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --no-progress "./**/*.md"
          fail: true
          jobSummary: true

